name: OSV-Scanner

# Сканирует lock-файлы (uv.lock, package-lock.json) по базе уязвимостей OSV.
# Это диагностический workflow: он показывает найденные уязвимости в логах и
# артефактах, но не должен блокировать релиз из-за уже известных зависимостей
# или лимитов GitHub API.
#
# OSV-Scanner не открывает PR и не меняет версии зависимостей.

on:
  # No paths filter — the job must always run so the required check
  # reports a status (path-gated workflows leave checks "pending" forever
  # when no matching files change, which blocks merge).
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "uv.lock"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
      - "website/package-lock.json"
      - ".github/workflows/osv-scanner.yml"
  schedule:
    # Weekly scan against main — catches CVEs published after merge for
    # deps that haven't changed since.
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan lockfiles
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # Scan explicit lockfiles rather than recursing, so we only look at
      # the three sources of truth and skip vendored / test / worktree dirs.
      scan-args: |-
        --lockfile=uv.lock
        --lockfile=package-lock.json
        --lockfile=website/package-lock.json
      fail-on-vuln: false
      upload-sarif: true
